<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport 18 | Premium Sports Streaming Dashboard</title>
    <meta name="description" content="Access all your favorite sports channels in one premium dashboard. Fast, responsive, and always up-to-date.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <header>
            <h1>SPORT 18</h1>
            <p class="subtitle">Premium Live Sports Streaming Hub</p>
        </header>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="search" class="search-input" placeholder="Search for channels, teams, or sports...">
        </div>

        <div id="grid" class="grid">
            <!-- Skeleton cards while loading -->
            <div class="card skeleton" style="height: 240px;"></div>
            <div class="card skeleton" style="height: 240px;"></div>
            <div class="card skeleton" style="height: 240px;"></div>
            <div class="card skeleton" style="height: 240px;"></div>
            <div class="card skeleton" style="height: 240px;"></div>
            <div class="card skeleton" style="height: 240px;"></div>
            <div class="card skeleton" style="height: 240px;"></div>
            <div class="card skeleton" style="height: 240px;"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Sport 18. All channels are fetched from external sources.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
