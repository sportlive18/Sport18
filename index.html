<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportLink | Premium Sports Streaming</title>
    <meta name="description" content="Access all your favorite sports channels in one premium dashboard. Fast, responsive, and always up-to-date.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div id="grid-view" class="view active">
        <div class="container">
            <header>
                <h1>SportLink</h1>
                <p class="subtitle">Premium Live Sports Streaming Hub</p>
            </header>

            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search" class="search-input" placeholder="Search for channels, teams, or sports...">
            </div>

            <div id="grid" class="grid">
                <!-- Skeleton cards while loading -->
                <div class="card skeleton" style="height: 240px;"></div>
                <div class="card skeleton" style="height: 240px;"></div>
                <div class="card skeleton" style="height: 240px;"></div>
                <div class="card skeleton" style="height: 240px;"></div>
                <div class="card skeleton" style="height: 240px;"></div>
                <div class="card skeleton" style="height: 240px;"></div>
                <div class="card skeleton" style="height: 240px;"></div>
                <div class="card skeleton" style="height: 240px;"></div>
            </div>
        </div>
    </div>

    <!-- Player logic now moved to player.html -->

    <a href="https://whatsapp.com/channel/0029VbC2oQsC6ZvmwpR3v73v" target="_blank" class="whatsapp-btn" id="whatsapp-link">
        <i class="fa-brands fa-whatsapp"></i>
        <span>Join WhatsApp</span>
    </a>

    <footer>
        <p>&copy; 2026 SportLink. All channels are fetched from external sources.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
